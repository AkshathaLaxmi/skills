name: Skill Evaluator (Tier 1)

on:
  pull_request:
    branches: [main]
    paths:
      - "skills/**"
      - "packages/skill-evaluator/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Detect changed skills
        id: detect
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          # Find changed files under skills/
          CHANGED_SKILLS=$(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" -- 'skills/' \
            | awk -F/ 'NF>=2 {print $1"/"$2}' \
            | sort -u)

          # Check if only the evaluator itself changed (no skills)
          EVALUATOR_CHANGED=$(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" -- 'packages/skill-evaluator/' | head -1)

          if [ -z "$CHANGED_SKILLS" ] && [ -n "$EVALUATOR_CHANGED" ]; then
            echo "No skill changes detected — running against all skills as regression test"
            CHANGED_SKILLS=$(find skills -mindepth 1 -maxdepth 1 -type d | sort)
          fi

          if [ -z "$CHANGED_SKILLS" ]; then
            echo "No skills to evaluate"
            echo "skills=" >> "$GITHUB_OUTPUT"
          else
            echo "Skills to evaluate:"
            echo "$CHANGED_SKILLS"
            # Store as newline-separated list
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "skills<<$EOF" >> "$GITHUB_OUTPUT"
            echo "$CHANGED_SKILLS" >> "$GITHUB_OUTPUT"
            echo "$EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Tier 1 evaluations
        id: evaluate
        if: steps.detect.outputs.skills != ''
        working-directory: packages/skill-evaluator
        env:
          SKILLS_LIST: ${{ steps.detect.outputs.skills }}
        run: |
          FAILED=0
          TOTAL=0
          REPORT=""

          while IFS= read -r skill_dir; do
            [ -z "$skill_dir" ] && continue
            TOTAL=$((TOTAL + 1))
            SKILL_PATH="../../${skill_dir}"

            echo "::group::Evaluating ${skill_dir}"
            OUTPUT=$(uv run evaluate.py "$SKILL_PATH" --tier 1 2>&1) && STATUS=0 || STATUS=$?
            echo "$OUTPUT"

            REPORT="${REPORT}
          ### \`${skill_dir}\`

          \`\`\`
          ${OUTPUT}
          \`\`\`
          "

            if [ "$STATUS" -ne 0 ]; then
              echo "::error::${skill_dir} failed Tier 1 checks"
              FAILED=$((FAILED + 1))
            fi
            echo "::endgroup::"
          done <<< "$SKILLS_LIST"

          echo ""
          echo "=== Results: ${TOTAL} skill(s) evaluated, ${FAILED} failed ==="

          # Save report for the comment step
          REPORT_FILE=$(mktemp)
          echo "$REPORT" > "$REPORT_FILE"
          echo "report_file=$REPORT_FILE" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -gt 0 ]; then
            exit 1
          fi

      - name: Comment on PR
        if: always() && steps.evaluate.outcome != 'skipped'
        uses: actions/github-script@v7
        env:
          FAILED_COUNT: ${{ steps.evaluate.outputs.failed }}
          TOTAL_COUNT: ${{ steps.evaluate.outputs.total }}
          REPORT_FILE: ${{ steps.evaluate.outputs.report_file }}
        with:
          script: |
            const fs = require('fs');
            const failed = parseInt(process.env.FAILED_COUNT, 10);
            const total = parseInt(process.env.TOTAL_COUNT, 10);
            const status = failed === 0 ? '✅ All checks passed' : `❌ ${failed} of ${total} skill(s) failed`;

            let details = '';
            const reportFile = process.env.REPORT_FILE;
            if (reportFile && fs.existsSync(reportFile)) {
              details = fs.readFileSync(reportFile, 'utf8');
            }

            const marker = '<!-- skill-evaluator-results -->';
            const body = `${marker}\n## Skill Evaluator — Tier 1 Results\n\n**${status}**\n\n${details}`;

            // Find and update existing comment, or create a new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
